<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Financial Buddy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        html, body {
            height: 100%;
            min-height: 100vh;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #e3f0ff 0%, #b6d0f7 100%);
        }
        main.container {
            flex: 1 0 auto;
        }
        .navbar {
            background: linear-gradient(90deg, #1565c0 0%, #42a5f5 100%) !important;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.7rem;
            color: #fff !important;
        }
        .nav-link.active, .nav-link:focus, .nav-link:hover {
            color: #1565c0 !important;
            background: #e3f0ff;
            border-radius: 8px;
        }
        .card {
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(21,101,192,0.08);
            border: none;
            background: linear-gradient(135deg, #f8fbff 0%, #e3f0ff 100%);
        }
        .card-header {
            border-radius: 18px 18px 0 0 !important;
            background: linear-gradient(90deg, #1976d2 0%, #64b5f6 100%) !important;
            color: #fff !important;
        }
        .btn-primary {
            background: linear-gradient(90deg, #1976d2 0%, #64b5f6 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #1565c0 0%, #42a5f5 100%);
        }
        .info-btn {
            background: none;
            border: none;
            color: #1976d2;
            font-size: 1.1rem;
            margin-left: 0.3rem;
            cursor: pointer;
        }
        .info-btn:focus {
            outline: 2px solid #1565c0;
        }
        .marked-response {
            background: #e3f0ff;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 0.5rem;
            font-size: 1.08rem;
            color: #222;
        }
        .footer {
            margin-top: auto !important;
            flex-shrink: 0;
            background: #e3f0ff;
            border-top: 1px solid #b6d0f7;
        }
        .currency-select {
            background: linear-gradient(90deg, #1976d2 0%, #64b5f6 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.3rem 1rem;
            font-weight: 500;
            margin-left: 1rem;
            transition: background 0.3s;
        }
        .currency-select:focus {
            outline: 2px solid #1565c0;
        }
        .currency-select option {
            color: #1565c0;
            background: #fff;
        }
        .custom-tooltip {
            position: absolute;
            background: #fff;
            color: #222;
            border: 1px solid #b6d0f7;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(21,101,192,0.08);
            padding: 0.5rem 1rem;
            font-size: 0.98rem;
            z-index: 9999;
            pointer-events: none;
            transition: opacity 0.2s;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand animate__animated animate__fadeIn" href="/">
                <i class="fas fa-piggy-bank"></i> Smart Financial Buddy
            </a>
            <form method="POST" action="{{ url_for('set_currency') }}" class="d-flex align-items-center ms-3">
                <select name="currency" class="currency-select" onchange="this.form.submit()" aria-label="Select currency">
                    {% for code, symbol in currencies.items() %}
                        <option value="{{ code }}" {% if session.get('currency', 'USD') == code %}selected{% endif %}>
                            {{ symbol }} {{ code }}
                        </option>
                    {% endfor %}
                </select>
            </form>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/dashboard' in request.path %}active{% endif %}" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/chat' in request.path %}active{% endif %}" href="/chat">Chat</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer py-3">
        <div class="container text-center">
            <span class="text-muted">© 2025 Smart Financial Buddy. All rights reserved.</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/your-font-awesome-kit.js"></script>
    <script>
    document.querySelectorAll('.info-btn').forEach(btn => {
        btn.addEventListener('mouseenter', function(e) {
            const tooltip = document.createElement('div');
            tooltip.className = 'custom-tooltip';
            tooltip.innerText = btn.getAttribute('data-info');
            document.body.appendChild(tooltip);
            const rect = btn.getBoundingClientRect();
            tooltip.style.top = (rect.bottom + window.scrollY + 8) + 'px';
            tooltip.style.left = (rect.left + window.scrollX) + 'px';
            btn._tooltip = tooltip;
        });
        btn.addEventListener('mouseleave', function() {
            if (btn._tooltip) {
                btn._tooltip.remove();
                btn._tooltip = null;
            }
        });
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
