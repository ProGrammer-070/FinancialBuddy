{% extends "base.html" %}

{% block title %}Chat - Smart Financial Buddy{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-lg animate__animated animate__fadeIn">
            <div class="card-header d-flex align-items-center">
                <h3 class="mb-0 flex-grow-1">Chat with AI</h3>
                <button class="info-btn" data-info="Ask anything about personal finance, budgeting, investing, or financial terms.">
                    <i class="fas fa-info-circle"></i>
                </button>
            </div>
            <div class="card-body">
                <div id="chat-history" style="min-height:200px; max-height:350px; overflow-y:auto;" class="mb-3"></div>
                <form id="chatForm" autocomplete="off">
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control" placeholder="Type your question...">
                        <button class="btn btn-primary" type="submit">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatHistory = document.getElementById('chat-history');
document.getElementById('chatForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const input = document.getElementById('chatInput');
    const userMsg = input.value.trim();
    if (!userMsg) return;
    chatHistory.innerHTML += `<div class="mb-2"><strong>You:</strong> ${userMsg}</div>`;
    input.value = '';
    chatHistory.scrollTop = chatHistory.scrollHeight;
    try {
        const res = await fetch('/chat_api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userMsg })
        });
        const data = await res.json();
        chatHistory.innerHTML += `<div class="marked-response">${marked.parse(data.response)}</div>`;
        chatHistory.scrollTop = chatHistory.scrollHeight;
    } catch {
        chatHistory.innerHTML += `<div class="alert alert-danger mt-2">Error getting response.</div>`;
    }
});
</script>
{% endblock %}
